name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
    steps:
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Update and deploy
        shell: bash
        run: |
          set -euo pipefail
          ssh \
            -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" <<'EOF'
              set -euo pipefail
              cd /opt/mindbridge
              git fetch --prune origin main
              git reset --hard origin/main
              git clean -fd deploy
              cd deploy
              docker compose --env-file .env.production up --build --detach --remove-orphans
              docker compose --env-file .env.production ps
          EOF
