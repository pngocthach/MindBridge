<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EduOne Learning Home — Clone</title>
<style>
:root{--ink:#171526;--muted:#7b7888;--purple:#6c2bea;--line:#eeeaf5;--surface:#fff;--lav:#f5f0ff;--pink:#fff1f4;--shadow:0 12px 30px #4a28721c}*{box-sizing:border-box}body{margin:0;color:var(--ink);font:14px/1.45 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;background:linear-gradient(135deg,#fbfaff 0,#fff5fa 53%,#fff 100%)}button{font:inherit;border:0;cursor:pointer;color:inherit}.app{min-height:100vh;display:grid;grid-template-columns:70px 1fr}.rail{background:#fff;border-right:1px solid #f0edf5;display:flex;flex-direction:column;align-items:center;padding:22px 0 18px;gap:28px}.logo{width:34px;height:34px;object-fit:contain}.rail nav{display:flex;flex-direction:column;gap:18px;align-items:center;flex:1}.nav-btn,.avatar{width:42px;height:42px;border-radius:13px;background:transparent;display:grid;place-items:center}.nav-btn.active{background:#f0eaff;color:var(--purple)}.nav-btn svg{width:20px;height:20px}.avatar{border-radius:50%;background:linear-gradient(145deg,#d991ff,#7024d5);color:#fff;font-size:18px}.content{padding:24px 4.5vw 42px;max-width:1540px;width:100%;margin:auto}.home-head{display:flex;align-items:center;gap:13px;margin:24px 0 38px}.home-head img{width:45px;height:45px;object-fit:contain}.home-head h1{font-size:30px;line-height:1.1;margin:0;font-weight:700}.section-title{font-size:20px;margin:0 0 18px}.courses{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:26px}.course{background:#fff;border-radius:17px;box-shadow:var(--shadow);overflow:hidden;transition:.2s transform,.2s box-shadow}.course:hover{transform:translateY(-4px);box-shadow:0 18px 36px #4a287230}.course-visual{height:156px;position:relative;background:#f5f3ff}.course-visual img{width:100%;height:100%;object-fit:cover}.tag{position:absolute;top:14px;left:14px;background:#fff;padding:5px 9px;border-radius:6px;color:#5130b5;font-size:12px}.course-body{padding:14px 14px 10px}.course-body h2{font-size:15px;line-height:1.35;margin:0 0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.expiry{color:#8e8b97;margin-bottom:13px}.progress-row{display:flex;align-items:center;justify-content:space-between;color:#766f7d}.progress{height:5px;background:#eeeafd;border-radius:10px;overflow:hidden;flex:1;margin-right:12px}.progress i{display:block;height:100%;background:#b9ebdf;border-radius:inherit}.open-btn{width:36px;height:36px;border-radius:10px;background:#fff;border:1px solid #e7e2ec;float:right;font-size:20px}.profile-menu{position:fixed;left:80px;bottom:18px;background:#fff;border:1px solid #eee8f4;border-radius:14px;box-shadow:var(--shadow);padding:15px;width:245px;z-index:5}.profile-menu strong,.profile-menu span{display:block}.profile-menu span{color:var(--muted);font-size:12px;margin-top:2px}.profile-menu hr{border:0;border-top:1px solid var(--line);margin:12px 0}.profile-menu button{background:none;padding:0;color:#c13b52}.assistant{position:fixed;right:24px;bottom:20px;width:50px;height:50px;border-radius:50%;background:linear-gradient(145deg,#f8cf4e,#4b9eff);box-shadow:var(--shadow);font-size:27px}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);opacity:0;background:#252033;color:#fff;border-radius:10px;padding:11px 16px;transition:.2s;z-index:10}.toast.show{opacity:1;transform:translate(-50%,0)}.detail{min-height:650px}.back{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 13px;margin-bottom:18px}.detail-hero{display:grid;grid-template-columns:1.1fr .9fr;overflow:hidden;border-radius:20px;background:linear-gradient(125deg,#fff6fd,#f7f0ff);box-shadow:var(--shadow)}.detail-copy{padding:35px 34px}.detail-copy .tag{position:static;display:inline-block}.detail-copy h1{font-size:30px;line-height:1.15;margin:14px 0 10px;max-width:580px}.detail-copy p{color:#777384}.facts{display:flex;gap:38px;margin:22px 0;color:var(--muted)}.facts b{display:block;color:#5d29c9;font-size:15px}.continue{background:linear-gradient(90deg,#7627e8,#8e2deb);color:#fff;border-radius:24px;padding:13px 22px}.detail-art{min-height:330px;background:#f1edff}.detail-art img{width:100%;height:100%;object-fit:cover}.detail-section{padding:28px 0}.detail-section h2{font-size:18px}.feature-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}.feature{background:#fff;border-radius:14px;height:95px;box-shadow:var(--shadow);padding:18px}.chat{position:fixed;right:24px;bottom:80px;width:285px;background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:15px}.chat p{margin:0 0 10px}.chat input{width:100%;padding:9px;border:1px solid var(--line);border-radius:8px}.hidden{display:none!important}@media(max-width:850px){.app{grid-template-columns:58px 1fr}.content{padding:18px}.courses{grid-template-columns:1fr}.detail-hero{grid-template-columns:1fr}.detail-art{min-height:220px;grid-row:1}.detail-copy h1{font-size:25px}.feature-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app"><aside class="rail"><img class="logo" alt="Logo" src="https://apps.lms.eduone.ai/learning/f4576c0fb62fda725c5b4050f33a7578.png"><nav><button class="nav-btn active" id="homeBtn" aria-label="Trang chủ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="m4 10 8-6 8 6v9a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z"/><path d="M9 20v-6h6v6"/></svg></button></nav><button class="avatar" id="profileBtn" aria-label="Tài khoản">V</button></aside><main class="content" id="screen"></main></div><button class="assistant" id="assistantBtn" aria-label="Trợ lý">🧑‍🚀</button><div class="toast" id="toast"></div>
<script>
const courses=[
 {id:'news',tag:'Nhà báo',title:'Nhà báo 4.0: Làm chủ nội dung trong kỷ nguyên AI',date:'14/08/2026, 14:04',progress:5,img:'https://lms.eduone.ai/asset-v1:AVPN+AI006_+2026_T4+type@asset+block@asset-v1_AVPN_AI006_2026_T4_type_asset_block_Nha__ba_o.png'},
 {id:'health',tag:'Y tế',title:'Bác sĩ thời AI: Ứng dụng AI trong y tế',date:'14/08/2026, 13:43',progress:0,img:'https://lms.eduone.ai/asset-v1:AVPN+AI007+2026_T4+type@asset+block@Course_thumb_2.png'},
 {id:'teacher',tag:'Giáo viên',title:'Giáo dục thời AI: Quản trị và sáng tạo',date:'14/08/2026, 14:10',progress:0,img:'https://lms.eduone.ai/asset-v1:AVPN+AI005+2026_T4+type@asset+block@Container.png'}
];
const screen=document.querySelector('#screen'),toastEl=document.querySelector('#toast');let toastTimer;
function toast(msg){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2200)}
function home(){screen.innerHTML=`<section class="home"><div class="home-head"><img src="https://apps.lms.eduone.ai/learning/8d97ab58ce86c1afc032.webp"><h1>Xin chào, vũ tùng đinh!</h1></div><h2 class="section-title">Khóa học của tôi</h2><div class="courses">${courses.map(c=>`<article class="course" data-course="${c.id}" tabindex="0"><div class="course-visual"><img alt="${c.title}" src="${c.img}"><span class="tag">◈ ${c.tag}</span></div><div class="course-body"><h2>${c.title}</h2><div class="expiry">Ngày hết hạn: ${c.date}</div><div class="progress-row"><span>Tiến độ: ${c.progress}%</span><div class="progress"><i style="width:${c.progress}%"></i></div><button class="open-btn" aria-label="Xem khóa học">↗</button></div></div></article>`).join('')}</div></section>`;document.querySelectorAll('[data-course]').forEach(el=>{el.onclick=()=>detail(courses.find(c=>c.id===el.dataset.course));el.onkeydown=e=>{if(e.key==='Enter')el.click()}})}
function detail(c){screen.innerHTML=`<section class="detail"><button class="back" id="back">← Quay lại khóa học</button><div class="detail-hero"><div class="detail-copy"><span class="tag">✦ Tạo ra bởi AI</span><h1>${c.title}</h1><p>AI for Impact</p><div class="facts"><div>Khối lượng<b>5 bài học</b></div><div>Thời lượng<b>4 tuần</b></div></div><button class="continue" id="continue">Tiếp tục học ↗</button></div><div class="detail-art"><img alt="${c.title}" src="${c.img}"></div></div><div class="detail-section"><h2>🖊 Giới thiệu khóa học</h2><p>Ứng dụng AI để phân tích đa phương tiện, tối ưu sản xuất nội dung và kiểm chứng thông tin.</p><div class="feature-grid"><div class="feature">🛡️<br><b>Học đúng mục tiêu</b></div><div class="feature">✣<br><b>Nội dung thực tế</b></div><div class="feature">🔖<br><b>Học liệu chọn lọc</b></div><div class="feature">♟<br><b>Cộng đồng hỗ trợ</b></div></div></div></section>`;document.querySelector('#back').onclick=home;document.querySelector('#continue').onclick=()=>toast('Đã mở bài học tiếp theo')}
document.querySelector('#homeBtn').onclick=home;document.querySelector('#profileBtn').onclick=()=>{document.querySelector('.profile-menu')?.remove();const m=document.createElement('div');m.className='profile-menu';m.innerHTML='<strong>vũ tùng đinh</strong><span>dinhvutunglamdinhcao@gmail.com</span><hr><button>⇥ Đăng xuất</button>';document.body.appendChild(m);m.querySelector('button').onclick=()=>{m.remove();toast('Prototype: đăng xuất')};setTimeout(()=>document.addEventListener('click',function close(e){if(!m.contains(e.target)&&e.target.id!=='profileBtn'){m.remove();document.removeEventListener('click',close)}}),0)};document.querySelector('#assistantBtn').onclick=()=>{document.querySelector('.chat')?.remove();const c=document.createElement('div');c.className='chat';c.innerHTML='<b>Trợ lý EduOne</b><p>Xin chào! Tôi có thể giúp bạn tìm khóa học.</p><input placeholder="Nhập câu hỏi...">';document.body.appendChild(c)};home();
</script>
</body></html>
