<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MindBridge — Interactive Flow Prototype</title>
<style>
:root{--ink:#182239;--muted:#6d7890;--line:#e3e8f1;--bg:#f4f6fa;--surface:#fff;--blue:#315efb;--blue-soft:#eaf0ff;--green:#0c8a67;--green-soft:#e7f8f1;--orange:#ad6515;--orange-soft:#fff4e3;--red:#b33c4a;--red-soft:#fff0f2;--shadow:0 14px 34px #24366112}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}.top{height:68px;padding:0 28px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:11px;font-weight:850;font-size:18px}.logo{display:grid;place-items:center;width:35px;height:35px;border-radius:11px;background:linear-gradient(135deg,#315efb,#7392ff);color:#fff;font-size:18px}.brand small{display:block;color:var(--muted);font-size:10px;letter-spacing:.08em;text-transform:uppercase}.top-right{display:flex;align-items:center;gap:10px}.role{padding:8px 11px;border:1px solid var(--line);border-radius:9px;color:var(--muted);font-size:12px}.avatar{display:grid;place-items:center;width:34px;height:34px;border-radius:50%;background:var(--blue-soft);color:var(--blue);font-weight:800}.page{max-width:1440px;margin:auto;padding:28px}.intro{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:22px}.eyebrow{color:var(--blue);font-size:11px;font-weight:850;letter-spacing:.12em;text-transform:uppercase}.title{margin:4px 0;font-size:30px;letter-spacing:-.04em}.muted{color:var(--muted)}.flow-tabs{display:flex;gap:8px;padding:6px;margin-bottom:20px;border:1px solid var(--line);border-radius:14px;background:#fff;overflow:auto}.flow-tab{min-width:160px;padding:12px 14px;border-radius:9px;background:transparent;color:var(--muted);text-align:left}.flow-tab:hover{background:#f2f4f8}.flow-tab.active{background:var(--blue-soft);color:var(--blue);font-weight:800}.flow-tab b{display:block;font-size:13px}.flow-tab span{font-size:11px}.stepper{display:flex;align-items:center;margin-bottom:18px;overflow:auto}.step-dot{display:flex;align-items:center;gap:8px;white-space:nowrap;color:#9aa4b6;font-size:12px;font-weight:750}.step-dot.active{color:var(--blue)}.step-dot.done{color:var(--green)}.dot{display:grid;place-items:center;width:27px;height:27px;border:2px solid #dbe1eb;border-radius:50%;background:#fff;font-size:11px}.step-dot.active .dot{border-color:var(--blue);background:var(--blue);color:#fff}.step-dot.done .dot{border-color:var(--green);background:var(--green);color:#fff}.connector{width:40px;height:2px;margin:0 8px;background:#dfe4ed}.flow-layout{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(290px,.6fr);gap:17px}.card{padding:21px;border:1px solid var(--line);border-radius:16px;background:var(--surface);box-shadow:var(--shadow)}.card h2{margin:0 0 5px;font-size:20px;letter-spacing:-.025em}.card h3{margin:0 0 6px;font-size:16px}.section{margin-top:15px}.section-head{display:flex;align-items:end;justify-content:space-between;gap:10px;margin-bottom:12px}.btn{padding:10px 14px;border:0;border-radius:9px;background:var(--blue);color:#fff;font-weight:800;cursor:pointer}.btn.secondary{border:1px solid var(--line);background:#fff;color:var(--ink)}.btn.green{background:var(--green)}.btn.orange{background:#dc9639}.btn.small{padding:7px 10px;font-size:12px}.btn:disabled{opacity:.45;cursor:not-allowed}.grid{display:grid;gap:12px}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}.field{display:grid;gap:6px;margin:12px 0}.field label{color:var(--muted);font-size:12px;font-weight:750}.input,.select,.textarea{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font:inherit}.textarea{min-height:115px;resize:vertical}.chip{display:inline-block;padding:4px 8px;border-radius:6px;background:var(--blue-soft);color:var(--blue);font-size:11px;font-weight:800}.chip.green{background:var(--green-soft);color:var(--green)}.chip.orange{background:var(--orange-soft);color:var(--orange)}.chip.red{background:var(--red-soft);color:var(--red)}.status{display:flex;align-items:center;justify-content:space-between;padding:12px;border-radius:10px;background:#f5f7fb}.status strong{font-size:13px}.status small{color:var(--muted)}.checklist{display:grid;gap:9px}.check{display:flex;gap:9px;padding:10px 11px;border-radius:9px;background:#f7f8fb;color:var(--muted)}.check:before{content:'✓';display:grid;place-items:center;flex:0 0 19px;height:19px;border-radius:50%;background:var(--green);color:#fff;font-size:11px;font-weight:900}.check.pending:before{content:'·';background:#d9deea;color:#6d7890}.preview{padding:17px;border:1px solid var(--line);border-radius:11px;background:#fbfcfe}.preview h4{margin:0 0 8px}.preview p{margin:7px 0;color:var(--muted)}.code{padding:12px;border-radius:9px;background:#17233f;color:#dbe6ff;font:12px/1.7 ui-monospace,SFMono-Regular,Consolas,monospace;white-space:pre-wrap}.reason{padding:13px;border-left:3px solid var(--blue);border-radius:8px;background:var(--blue-soft);color:#28458f}.reason strong{display:block;margin-bottom:4px}.event-list{display:grid;gap:0}.event{display:grid;grid-template-columns:68px 16px 1fr;gap:8px;min-height:57px}.event time{color:var(--muted);font-size:11px}.event .line{position:relative;display:flex;justify-content:center}.event .line:before{content:'';width:9px;height:9px;margin-top:4px;border-radius:50%;background:var(--blue);z-index:1}.event .line:after{content:'';position:absolute;top:13px;bottom:0;width:1px;background:#dce2ee}.event:last-child .line:after{display:none}.event-text{font-size:12px}.student-select{display:flex;flex-wrap:wrap;gap:8px}.student-btn{padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--muted);text-align:left}.student-btn.active{border-color:var(--blue);background:var(--blue-soft);color:var(--blue);font-weight:800}.student-btn small{display:block;font-size:10px}.quiz-option{display:block;width:100%;margin:8px 0;padding:12px;border:1px solid var(--line);border-radius:9px;background:#fff;text-align:left}.quiz-option:hover,.quiz-option.selected{border-color:var(--blue);background:var(--blue-soft)}.quiz-option.correct{border-color:var(--green);background:var(--green-soft)}.quiz-option.wrong{border-color:var(--red);background:var(--red-soft)}.progress{height:8px;border-radius:99px;background:#edf0f6;overflow:hidden}.progress i{display:block;height:100%;border-radius:inherit;background:var(--blue)}.metric{font-size:27px;font-weight:850;letter-spacing:-.04em}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px 7px;border-bottom:1px solid var(--line);text-align:left}.table th{color:var(--muted);font-size:11px;text-transform:uppercase}.table tr:last-child td{border:0}.toast{position:fixed;right:22px;bottom:24px;z-index:30;padding:12px 15px;border-radius:10px;background:#17233f;color:#fff;opacity:0;transform:translateY(8px);transition:.2s;pointer-events:none;box-shadow:var(--shadow)}.toast.show{opacity:1;transform:none}.foot-note{margin-top:17px;text-align:center;color:var(--muted);font-size:11px}@media(max-width:900px){.page{padding:18px 13px}.top{padding:0 14px}.intro{display:block}.intro .role{display:none}.flow-layout{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}@media(max-width:560px){.g2,.g3{grid-template-columns:1fr}.stepper{align-items:flex-start}.connector{width:18px}.step-dot span{display:none}}
</style>
</head>
<body>
<header class="top"><div class="brand"><span class="logo">✦</span><div>MindBridge<small>EduOne AI layer · Flow prototype</small></div></div><div class="top-right"><span class="role" id="role">Admin / Content team⌄</span><span class="avatar" id="avatar">A</span></div></header>
<main class="page"><div class="intro"><div><div class="eyebrow">Interactive product flows</div><h1 class="title">Các luồng chính của MindBridge</h1><p class="muted">Chọn từng luồng để thử state và hành động của actor. Đây là mock UI, dữ liệu đang nằm trong browser.</p></div><button class="btn secondary" onclick="resetAll()">↻ Reset prototype</button></div><nav class="flow-tabs" id="flowTabs"></nav><div id="stepper"></div><div id="main"></div><div class="foot-note">Prototype only · Không có dữ liệu thật · Phím ← → chuyển luồng</div></main><div class="toast" id="toast"></div>
<script>
const flows=[
 {id:'content',icon:'✦',name:'Tạo học liệu bằng AI',actor:'Admin / Content team',steps:['Nhập yêu cầu','AI tạo draft','Gắn metadata','Lưu In Review']},
 {id:'review',icon:'✓',name:'Review & publish',actor:'Admin / Reviewer',steps:['Mở bản nháp','Chỉnh sửa','Approve','Publish']},
 {id:'student',icon:'◉',name:'Học viên nhận lộ trình',actor:'Học viên · An Nguyễn',steps:['Làm quiz','Phân tích','Xem đề xuất','Bắt đầu bài']},
 {id:'teacher',icon:'⌁',name:'Giáo viên giao bài & theo dõi',actor:'Giáo viên tình nguyện',steps:['Chọn lớp','Giao học liệu','Theo dõi','Gửi feedback']}
];
let flowIndex=0;let states={content:{step:0,generated:false},review:{step:0,edited:false,approved:false,published:false},student:{step:0,student:'An',answered:false,selected:null,started:false},teacher:{step:0,assigned:false,feedback:false}};
const $=s=>document.querySelector(s);const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__t);window.__t=setTimeout(()=>t.classList.remove('show'),2300)}
function resetAll(){states={content:{step:0,generated:false},review:{step:0,edited:false,approved:false,published:false},student:{step:0,student:'An',answered:false,selected:null,started:false},teacher:{step:0,assigned:false,feedback:false}};render();toast('Prototype đã reset')}
function renderTabs(){ $('#flowTabs').innerHTML=flows.map((f,i)=>`<button class="flow-tab ${i===flowIndex?'active':''}" onclick="switchFlow(${i})"><b>${f.icon} ${f.name}</b><span>${f.actor}</span></button>`).join('') }
function renderStepper(){const f=flows[flowIndex],s=states[f.id].step;$('#stepper').innerHTML=`<div class="stepper">${f.steps.map((x,i)=>`${i?'<span class="connector"></span>':''}<div class="step-dot ${i===s?'active':i<s?'done':''}"><span class="dot">${i<s?'✓':i+1}</span><span>${x}</span></div>`).join('')}</div>`}
function switchFlow(i){flowIndex=i;render();}
function contentFlow(){const s=states.content;return `<div class="flow-layout"><section class="card"><h2>Tạo bản nháp học liệu</h2><p class="muted">Admin nhập mục tiêu; AI tạo draft có cấu trúc để review.</p><div class="field"><label>Chủ đề</label><input class="input" value="Vòng lặp for trong Python"></div><div class="grid g2"><div class="field"><label>Khối lớp</label><select class="select"><option>Lớp 6–8</option></select></div><div class="field"><label>Độ khó</label><select class="select"><option>Cơ bản</option><option>Trung bình</option></select></div></div><div class="field"><label>Mục tiêu học tập</label><textarea class="textarea">Học sinh hiểu cách vòng lặp for đi qua từng phần tử và dùng được range().</textarea></div><div class="field"><label>Loại nội dung</label><div><span class="chip">Bài học</span> <span class="chip">5 bài tập</span> <span class="chip">Quiz + đáp án</span></div></div><button class="btn" onclick="generateDraft()">${s.generated?'↻ Tạo lại bản nháp':'✦ Tạo bản nháp bằng AI'}</button></section><aside class="card"><div class="section-head"><h3>Trạng thái workflow</h3><span class="chip ${s.generated?'green':''}">${s.generated?'Draft ready':'Chưa tạo'}</span></div><div class="checklist"><div class="check">Input có mục tiêu và khối lớp</div><div class="check ${s.generated?'':'pending'}">AI sinh nội dung theo template</div><div class="check pending">Admin kiểm tra kiến thức</div><div class="check pending">Gắn skill và prerequisite</div><div class="check pending">Chuyển sang In Review</div></div><div class="section reason"><strong>AI không được publish trực tiếp</strong>Draft chỉ là bản nháp. Admin phải review và approve trước khi học viên nhìn thấy.</div></aside></div>${s.generated?`<section class="card section"><div class="section-head"><div><h2>Draft: Vòng lặp for trong Python</h2><span class="chip orange">AI generated</span></div><button class="btn green small" onclick="sendToReview()">Lưu vào In Review →</button></div><div class="preview"><h4>Mục tiêu</h4><p>Học sinh hiểu cách vòng lặp for đi qua từng phần tử và dùng được range().</p><h4>Giải thích</h4><p>Vòng lặp for giúp lặp lại một thao tác cho từng giá trị trong một dãy.</p><div class="code">for i in range(3):\n    print(i)</div><h4 style="margin-top:14px">Bài tập mẫu</h4><p>Đoạn code trên in ra những số nào?</p></div></section>`:''}`}
function generateDraft(){states.content.generated=true;states.content.step=1;render();toast('AI đã tạo bản nháp gồm bài học, bài tập và quiz')}
function sendToReview(){states.content.step=3;render();toast('Đã lưu học liệu vào trạng thái In Review')}
function reviewFlow(){const s=states.review;let status=s.published?'Published':s.approved?'Approved':s.edited?'In Review':'Draft';return `<div class="flow-layout"><section class="card"><div class="section-head"><div><h2>Review học liệu</h2><p class="muted">Vòng lặp for trong Python · AI draft</p></div><span class="chip ${s.published||s.approved?'green':s.edited?'orange':''}">${status}</span></div><div class="field"><label>Tiêu đề</label><input class="input" value="Vòng lặp for trong Python" oninput="markEdited()"></div><div class="field"><label>Nội dung bài học</label><textarea id="reviewText" class="textarea" oninput="markEdited()">Vòng lặp for giúp lặp lại một thao tác cho từng giá trị trong một dãy. Hãy quan sát ví dụ và thử thay đổi range(3).</textarea></div><div class="field"><label>Skill mapping</label><div><span class="chip">for-loop</span> <span class="chip">range</span> <span class="chip orange">Prerequisite: biến</span></div></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn secondary small" onclick="saveEdit()">Lưu chỉnh sửa</button><button class="btn green small" ${s.approved?'disabled':''} onclick="approveContent()">✓ Approve</button><button class="btn small" ${!s.approved||s.published?'disabled':''} onclick="publishContent()">Publish</button></div></section><aside class="card"><h3>Reviewer checklist</h3><div class="checklist"><div class="check">Đúng mục tiêu học tập</div><div class="check">Code và đáp án chính xác</div><div class="check">Ngôn ngữ phù hợp học sinh</div><div class="check">Độ khó phù hợp lớp 6–8</div><div class="check ${s.approved?'':'pending'}">Approve bởi Admin</div><div class="check ${s.published?'':'pending'}">Đã publish vào thư viện</div></div><div class="section status"><div><strong>Human review gate</strong><small>AI không có quyền publish</small></div><span class="chip green">Bắt buộc</span></div></aside></div>`}
function markEdited(){states.review.edited=true;states.review.step=1}function saveEdit(){states.review.edited=true;states.review.step=1;render();toast('Đã lưu chỉnh sửa của reviewer')}function approveContent(){states.review.edited=true;states.review.approved=true;states.review.step=2;render();toast('Đã approve — có thể publish')}function publishContent(){if(!states.review.approved)return;states.review.published=true;states.review.step=3;render();toast('Đã publish — học liệu sẵn sàng cho recommendation')}
function studentFlow(){const s=states.student;const profile=s.student==='An'?{name:'An Nguyễn',score:'40%',topic:'for-loop',rec:'Ôn lại khái niệm vòng lặp',reason:'Bạn sai 3/5 câu về for-loop. Hệ thống đề xuất bài bổ trợ trước khi quay lại bài chính.'}:{name:'Linh Phạm',score:'95%',topic:'Đã nắm',rec:'Bài tập vòng lặp lồng nhau',reason:'Bạn đạt 95% và hoàn thành nhanh hơn mức trung bình. Hệ thống đề xuất thử thách nâng cao.'};return `<section class="card"><div class="section-head"><div><h2>Chọn học viên để mô phỏng</h2><p class="muted">Cùng một course nhưng dữ liệu khác nhau tạo ra lộ trình khác nhau.</p></div><span class="chip">20 học viên pilot</span></div><div class="student-select"><button class="student-btn ${s.student==='An'?'active':''}" onclick="selectStudent('An')">An Nguyễn<small>40% · cần hỗ trợ</small></button><button class="student-btn ${s.student==='Linh'?'active':''}" onclick="selectStudent('Linh')">Linh Phạm<small>95% · học nhanh</small></button></div></section><div class="flow-layout section"><section class="card"><div class="section-head"><div><h2>${profile.name}</h2><p class="muted">Python cơ bản · Lớp 7</p></div><span class="chip ${s.student==='An'?'orange':'green'}">Quiz ${profile.score}</span></div><div class="grid g3"><div><div class="muted">Kỹ năng</div><strong>${profile.topic}</strong></div><div><div class="muted">Số lần làm lại</div><strong>${s.student==='An'?'2':'0'}</strong></div><div><div class="muted">Tốc độ</div><strong>${s.student==='An'?'Chậm':'Nhanh'}</strong></div></div><div class="section"><div class="section-head"><h3>Activity gần đây</h3><span class="chip">Live signals</span></div><div class="event-list"><div class="event"><time>09:20</time><span class="line"></span><div class="event-text"><b>Nộp quiz vòng lặp</b><br><span class="muted">${profile.score} · sai ở ${profile.topic}</span></div></div><div class="event"><time>Hôm qua</time><span class="line"></span><div class="event-text"><b>Hoàn thành bài điều kiện</b><br><span class="muted">${s.student==='An'?'70':'100'}%</span></div></div></div></div><button class="btn" onclick="analyzeStudent()">${s.step>=1?'↻ Phân tích lại':'Phân tích và tạo đề xuất'}</button></section><aside class="card"><h3>Explainability</h3>${s.step>=1?`<div class="reason"><strong>Đề xuất: ${profile.rec}</strong>${profile.reason}</div><div class="section checklist"><div class="check">Quiz score: ${profile.score}</div><div class="check">Topic signal: ${profile.topic}</div><div class="check">Prerequisite graph đã được cấu hình</div></div><button class="btn green" style="margin-top:14px;width:100%" onclick="startRecommendation()">Bắt đầu bài được đề xuất →</button>`:`<p class="muted">Bấm “Phân tích” để xem dữ liệu đầu vào, kỹ năng yếu và bài học được chọn.</p>`}</aside></div>${s.started?`<section class="card section"><div class="section-head"><div><h2>Quiz nhanh: ${profile.rec}</h2><p class="muted">Chọn một đáp án để mô phỏng activity mới.</p></div><span class="chip">1 câu · 2 phút</span></div><p><strong>Câu hỏi:</strong> Vòng lặp nào phù hợp để in các số từ 0 đến 2?</p><button class="quiz-option ${s.selected==='wrong'?'wrong':''}" onclick="answerQuiz('wrong')">A. while i &lt; 2</button><button class="quiz-option ${s.selected==='correct'?'correct':''}" onclick="answerQuiz('correct')">B. for i in range(3)</button><button class="quiz-option" onclick="answerQuiz('wrong')">C. for i in range(1)</button>${s.answered?`<div class="section reason"><strong>${s.selected==='correct'?'Chính xác!':'Chưa chính xác.'}</strong>${s.selected==='correct'?'Activity đã được cập nhật; hệ thống có thể đánh giá lại lộ trình.':'Hãy xem lại cách range tạo dãy số rồi thử lại.'}</div>`:''}</section>`:''}`}
function selectStudent(name){states.student.student=name;states.student.step=0;states.student.started=false;states.student.answered=false;states.student.selected=null;render()}function analyzeStudent(){states.student.step=2;render();toast('Đã phân tích activity và tạo recommendation')}function startRecommendation(){states.student.started=true;states.student.step=3;render();toast('Đã mở bài học được đề xuất')}function answerQuiz(result){states.student.answered=true;states.student.selected=result;render();toast(result==='correct'?'Quiz đúng — đã cập nhật activity':'Quiz chưa đúng — lưu tín hiệu cần hỗ trợ')}
function teacherFlow(){const s=states.teacher;return `<div class="flow-layout"><section class="card"><div class="section-head"><div><h2>Giao học liệu cho lớp</h2><p class="muted">Chỉ hiển thị nội dung đã Approved/Published.</p></div><span class="chip green">Teacher mode</span></div><div class="field"><label>Lớp học</label><select class="select"><option>Lớp 7A · 20 học viên</option></select></div><div class="field"><label>Học liệu</label><select class="select"><option>Ôn lại khái niệm vòng lặp · Published</option><option>Bài tập range() · Published</option></select></div><div class="grid g2"><div class="field"><label>Phạm vi giao</label><select class="select"><option>Cả lớp</option><option>Nhóm cần hỗ trợ</option></select></div><div class="field"><label>Hạn hoàn thành</label><input class="input" type="date" value="2026-07-24"></div></div><div class="reason"><strong>AI suggestion cho giáo viên</strong>6 học viên trong lớp đang có tín hiệu yếu ở for-loop. Bạn có thể giao bài bổ trợ này cho nhóm cần hỗ trợ.</div><button class="btn" style="margin-top:14px" onclick="assignLesson()">${s.assigned?'✓ Đã giao học liệu':'Giao học liệu cho lớp'}</button></section><aside class="card"><h3>Quyền của giáo viên</h3><div class="checklist"><div class="check">Xem tiến độ lớp</div><div class="check">Xem kỹ năng cần hỗ trợ</div><div class="check">Giao nội dung Published</div><div class="check">Gửi feedback cho Admin</div><div class="check pending">Không thể approve/publish</div></div></aside></div><section class="card section"><div class="section-head"><div><h2>Tiến độ lớp 7A</h2><p class="muted">Ôn lại khái niệm vòng lặp</p></div><span class="chip ${s.assigned?'green':''}">${s.assigned?'Đang thực hiện':'Chưa giao'}</span></div><table class="table"><thead><tr><th>Học viên</th><th>Trạng thái</th><th>Kết quả</th><th>AI signal</th></tr></thead><tbody><tr><td><strong>An Nguyễn</strong></td><td><span class="chip ${s.assigned?'orange':''}">${s.assigned?'Đang học':'—'}</span></td><td>${s.assigned?'40%':'—'}</td><td><span class="chip orange">Cần hỗ trợ</span></td></tr><tr><td><strong>Minh Trần</strong></td><td><span class="chip ${s.assigned?'green':''}">${s.assigned?'Hoàn thành':'—'}</span></td><td>${s.assigned?'80%':'—'}</td><td><span class="chip blue">Theo dõi</span></td></tr><tr><td><strong>Linh Phạm</strong></td><td><span class="chip ${s.assigned?'green':''}">${s.assigned?'Hoàn thành':'—'}</span></td><td>${s.assigned?'100%':'—'}</td><td><span class="chip green">Nâng cao</span></td></tr></tbody></table>${s.assigned?`<button class="btn secondary small" style="margin-top:13px" onclick="sendFeedback()">${s.feedback?'✓ Feedback đã gửi':'Gửi feedback cho Admin'}</button>`:''}</section>`}
function assignLesson(){states.teacher.assigned=true;states.teacher.step=2;render();toast('Đã giao học liệu cho lớp 7A')}function sendFeedback(){states.teacher.feedback=true;render();toast('Feedback đã gửi tới Admin/content team')}
function render(){renderTabs();renderStepper();const id=flows[flowIndex].id;$('#role').textContent=flows[flowIndex].actor+'⌄';$('#avatar').textContent=flows[flowIndex].actor[0];$('#main').innerHTML=id==='content'?contentFlow():id==='review'?reviewFlow():id==='student'?studentFlow():teacherFlow()}
document.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName))return;if(e.key==='ArrowRight')switchFlow((flowIndex+1)%flows.length);if(e.key==='ArrowLeft')switchFlow((flowIndex+flows.length-1)%flows.length)});render();
</script>
</body></html>
