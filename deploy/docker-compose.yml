name: mindbridge

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    restart: "no"

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: server
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env.production
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 6
    init: true
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: web
      args:
        VITE_SERVER_URL: ${PUBLIC_ORIGIN}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 6
    init: true
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      server:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      CADDY_SITE: ${CADDY_SITE}
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-config:
  caddy-data:
  postgres-data:
