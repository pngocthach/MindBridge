<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta content="width=device-width,initial-scale=1" name="viewport">
    <title>EduOne MindBridge — UI Prototype</title>
    <style>
    :root {
      --ink: #172033;
      --muted: #68738a;
      --line: #e5eaf2;
      --bg: #f4f6fa;
      --surface: #fff;
      --blue: #315efb;
      --blue2: #eaf0ff;
      --green: #0d8a67;
      --green2: #e7f8f1;
      --orange: #b86b14;
      --orange2: #fff4e3;
      --red: #b43e4c;
      --shadow: 0 14px 36px #1b2d5d12;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font:
        14px / 1.5 Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        "Segoe UI",
        sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    button {
      font: inherit;
      cursor: pointer;
      border: 0;
    }
    .app {
      max-width: 1440px;
      min-height: 100vh;
      margin: auto;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      padding: 0 28px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .brand {
      display: flex;
      gap: 11px;
      align-items: center;
      font-size: 18px;
      font-weight: 850;
    }
    .logo {
      display: grid;
      place-items: center;
      width: 35px;
      height: 35px;
      font-size: 18px;
      color: #fff;
      background: linear-gradient(135deg, #315efb, #6c8cff);
      border-radius: 11px;
    }
    .brand small {
      display: block;
      font-size: 10px;
      font-weight: 650;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .top-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .role {
      padding: 8px 12px;
      font-size: 12px;
      color: var(--muted);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 9px;
    }
    .avatar {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      font-weight: 800;
      color: var(--blue);
      background: #dfe7ff;
      border-radius: 50%;
    }
    .layout {
      display: grid;
      grid-template-columns: 230px 1fr;
      min-height: calc(100vh - 70px);
    }
    .side {
      padding: 23px 14px;
      background: #fff;
      border-right: 1px solid var(--line);
    }
    .side-label {
      margin: 13px 12px 7px;
      font-size: 10px;
      font-weight: 800;
      color: #9aa3b4;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .nav {
      width: 100%;
      padding: 11px 12px;
      margin: 2px 0;
      color: var(--muted);
      text-align: left;
      background: transparent;
      border-radius: 9px;
    }
    .nav:hover,
    .nav.active {
      font-weight: 750;
      color: var(--blue);
      background: var(--blue2);
    }
    .content {
      width: 100%;
      max-width: 1200px;
      padding: 30px;
      margin: auto;
    }
    .kicker {
      font-size: 11px;
      font-weight: 850;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .title {
      margin: 5px 0 4px;
      font-size: 30px;
      letter-spacing: -0.04em;
    }
    .muted {
      color: var(--muted);
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
    }
    .grid {
      display: grid;
      gap: 15px;
    }
    .g2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .g3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .g4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    .card {
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 15px;
      box-shadow: var(--shadow);
    }
    .card h3 {
      margin: 0 0 5px;
      font-size: 16px;
    }
    .metric {
      font-size: 29px;
      font-weight: 850;
      letter-spacing: -0.04em;
    }
    .metric-label {
      font-size: 12px;
      color: var(--muted);
    }
    .trend {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 750;
      color: var(--green);
    }
    .section {
      margin-top: 24px;
    }
    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-head h2 {
      margin: 0;
      font-size: 19px;
      letter-spacing: -0.02em;
    }
    .btn {
      padding: 10px 14px;
      font-weight: 750;
      color: #fff;
      background: var(--blue);
      border-radius: 9px;
    }
    .btn.secondary {
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
    }
    .btn.green {
      background: var(--green);
    }
    .btn.small {
      padding: 7px 10px;
      font-size: 12px;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 800;
      border-radius: 6px;
    }
    .b-blue {
      color: var(--blue);
      background: var(--blue2);
    }
    .b-green {
      color: var(--green);
      background: var(--green2);
    }
    .b-orange {
      color: var(--orange);
      background: var(--orange2);
    }
    .b-red {
      color: var(--red);
      background: #fff0f2;
    }
    .bar {
      height: 8px;
      overflow: hidden;
      background: #edf0f6;
      border-radius: 99px;
    }
    .bar i {
      display: block;
      height: 100%;
      background: var(--blue);
      border-radius: inherit;
    }
    .bar.green i {
      background: var(--green);
    }
    .bar.orange i {
      background: #e6a342;
    }
    .student {
      display: flex;
      gap: 11px;
      align-items: center;
    }
    .student .avatar {
      width: 38px;
      height: 38px;
    }
    .student-name {
      font-weight: 780;
    }
    .student-meta {
      font-size: 12px;
      color: var(--muted);
    }
    .table {
      width: 100%;
      border-collapse: collapse;
    }
    .table th,
    .table td {
      padding: 13px 8px;
      vertical-align: middle;
      text-align: left;
      border-bottom: 1px solid var(--line);
    }
    .table th {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .table tr:last-child td {
      border: 0;
    }
    .recommend {
      display: flex;
      gap: 13px;
      align-items: flex-start;
      padding: 14px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    .rec-icon {
      display: grid;
      flex: 0 0 36px;
      place-items: center;
      height: 36px;
      font-size: 17px;
      color: var(--blue);
      background: var(--blue2);
      border-radius: 10px;
    }
    .rec-title {
      font-weight: 780;
    }
    .rec-reason {
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted);
    }
    .timeline {
      display: grid;
      gap: 0;
    }
    .event {
      display: grid;
      grid-template-columns: 70px 18px 1fr;
      gap: 8px;
      min-height: 58px;
    }
    .event time {
      font-size: 11px;
      color: var(--muted);
    }
    .dot {
      position: relative;
      display: flex;
      justify-content: center;
    }
    .dot:before {
      z-index: 1;
      width: 10px;
      height: 10px;
      margin-top: 4px;
      content: "";
      background: var(--blue);
      border-radius: 50%;
    }
    .dot:after {
      position: absolute;
      top: 14px;
      bottom: 0;
      width: 1px;
      content: "";
      background: #dce2ee;
    }
    .event:last-child .dot:after {
      display: none;
    }
    .event-text {
      font-size: 12px;
    }
    .mini-list {
      display: grid;
      gap: 10px;
    }
    .mini-item {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid var(--line);
    }
    .mini-item:last-child {
      border: 0;
    }
    .icon-square {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      background: var(--blue2);
      border-radius: 10px;
    }
    .content-row {
      display: flex;
      gap: 13px;
      align-items: center;
    }
    .content-row .info {
      flex: 1;
    }
    .content-row strong {
      display: block;
    }
    .content-row small {
      color: var(--muted);
    }
    .tabs {
      display: flex;
      gap: 6px;
      padding: 4px;
      background: #eef1f7;
      border-radius: 11px;
    }
    .tab {
      padding: 8px 12px;
      font-weight: 700;
      color: var(--muted);
      background: transparent;
      border-radius: 8px;
    }
    .tab.active {
      color: var(--blue);
      background: #fff;
      box-shadow: 0 2px 7px #26355a14;
    }
    .hero-student {
      padding: 26px;
      color: #fff;
      background: linear-gradient(125deg, #14264e, #315efb);
      border-radius: 17px;
    }
    .hero-student h2 {
      margin: 3px 0 6px;
      font-size: 25px;
    }
    .hero-student p {
      margin: 0;
      color: #dbe4ff;
    }
    .dark-card {
      color: #fff;
      background: #1d2b4d;
      border: 0;
    }
    .dark-card .muted {
      color: #bdc9e7;
    }
    .ring {
      position: relative;
      display: grid;
      place-items: center;
      width: 100px;
      height: 100px;
      background: conic-gradient(#72d4b1 0 72%, #324566 72%);
      border-radius: 50%;
    }
    .ring:after {
      position: absolute;
      inset: 10px;
      content: "";
      background: #1d2b4d;
      border-radius: 50%;
    }
    .ring b {
      position: relative;
      z-index: 1;
      font-size: 22px;
    }
    .split {
      display: grid;
      grid-template-columns: 1.35fr 0.65fr;
      gap: 15px;
    }
    .editor {
      min-height: 190px;
      padding: 17px;
      background: #fbfcfe;
      border: 1px solid var(--line);
      border-radius: 11px;
    }
    .editor-line {
      padding: 6px 0;
      color: #58647a;
      border-bottom: 1px solid #edf0f5;
    }
    .editor-line b {
      color: var(--blue);
    }
    .kanban {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .lane {
      min-height: 220px;
      padding: 10px;
      background: #f2f4f8;
      border-radius: 11px;
    }
    .lane h4 {
      margin: 3px 3px 10px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .doc {
      padding: 12px;
      margin: 7px 0;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 9px;
      box-shadow: 0 3px 8px #1b2d5d08;
    }
    .doc strong {
      display: block;
      font-size: 12px;
    }
    .doc small {
      font-size: 11px;
      color: var(--muted);
    }
    .proto-bar {
      position: fixed;
      bottom: 18px;
      left: 50%;
      z-index: 20;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 7px 9px;
      color: #fff;
      background: #17223c;
      border: 1px solid #435478;
      border-radius: 14px;
      box-shadow: 0 13px 35px #07132955;
      transform: translateX(-50%);
    }
    .proto-bar button {
      width: 30px;
      height: 30px;
      font-size: 18px;
      color: #fff;
      background: #2a3b62;
      border-radius: 8px;
    }
    .proto-label {
      min-width: 150px;
      font-size: 11px;
      text-align: center;
    }
    .proto-label b {
      display: block;
      font-size: 12px;
    }
    .toast {
      position: fixed;
      right: 22px;
      bottom: 75px;
      z-index: 30;
      padding: 12px 15px;
      color: #fff;
      pointer-events: none;
      background: #17223c;
      border-radius: 10px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      transition: 0.2s;
    }
    .toast.show {
      opacity: 1;
      transform: none;
    }
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .side {
        display: none;
      }
      .content {
        padding: 20px 15px;
      }
      .g4,
      .g3,
      .g2,
      .split {
        grid-template-columns: 1fr;
      }
      .kanban {
        grid-template-columns: 1fr 1fr;
      }
      .top {
        padding: 0 15px;
      }
      .role {
        display: none;
      }
    }
    @media (max-width: 550px) {
      .kanban {
        grid-template-columns: 1fr;
      }
      .title {
        font-size: 25px;
      }
    }
    </style>
  </head>
  <body>
    <div class="app" id="app"></div>
    <div class="toast" id="toast"></div>
    <div class="proto-bar">
      <button aria-label="Previous variant" id="prev">‹</button>
      <div class="proto-label" id="variantLabel"></div>
      <button aria-label="Next variant" id="next">›</button>
    </div>
    <script>
    "use strict";
    const variants = [
      { key: "A", name: "Command Center" },
      { key: "B", name: "Student Journey" },
      { key: "C", name: "Content Studio" },
    ];
    let current = Math.max(
      0,
      variants.findIndex(
        (v) => v.key === new URLSearchParams(location.search).get("variant")
      )
    );
    const _esc = (s) =>
      String(s).replace(
        /[&<>"']/g,
        (c) =>
          ({
            "'": "&#039;",
            '"': "&quot;",
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
          })[c]
      );
    function shell(_side, body, role = "Admin / Content team") {
      return `<header class="top"><div class="brand"><span class="logo">✦</span><div>MindBridge<small>EduOne AI layer</small></div></div><div class="top-right"><span class="role">${role}⌄</span><span class="avatar">${role[0]}</span></div></header><div class="layout"><aside class="side"><button class="nav active">⌂ Tổng quan</button><button class="nav">◉ Học viên</button><button class="nav">◌ Lộ trình AI</button><div class="side-label">Content Studio</div><button class="nav">▣ Thư viện học liệu</button><button class="nav">✦ Tạo với AI</button><button class="nav">✓ Chờ duyệt</button><div class="side-label">Hệ thống</div><button class="nav">⚙ Cài đặt</button></aside><main class="content">${body}</main></div>`;
    }
    function variantA() {
      return shell(
        "",
        `<div class="kicker">Command Center</div><h1 class="title">Tổng quan EduOne MindBridge</h1><p class="subtitle">Theo dõi chất lượng học tập và hoạt động sản xuất học liệu.</p><div class="grid g4 section"><div class="card"><div class="metric">20</div><div class="metric-label">Học viên pilot</div><div class="trend">↑ 8% hoạt động tuần này</div></div><div class="card"><div class="metric">84%</div><div class="metric-label">Đề xuất được mở</div><div class="trend">↑ 12% so với tuần trước</div></div><div class="card"><div class="metric">18</div><div class="metric-label">Học liệu đã duyệt</div><div class="trend">+ 6 bản nháp đang chờ</div></div><div class="card"><div class="metric">−63%</div><div class="metric-label">Thời gian soạn nháp</div><div class="trend">AI + human review</div></div></div><div class="grid g2 section"><div class="card"><div class="section-head"><h2>Học viên cần chú ý</h2><button class="btn secondary small" onclick="toast('Mở danh sách 20 học viên')">Xem tất cả</button></div><table class="table"><thead><tr><th>Học viên</th><th>Kỹ năng</th><th>Đề xuất</th></tr></thead><tbody><tr><td><div class="student"><span class="avatar">A</span><div><div class="student-name">An Nguyễn</div><div class="student-meta">Lớp 6 · 2 ngày trước</div></div></div></td><td><span class="badge b-red">for-loop</span></td><td><span class="badge b-orange">Bổ trợ</span></td></tr><tr><td><div class="student"><span class="avatar">M</span><div><div class="student-name">Minh Trần</div><div class="student-meta">Lớp 7 · hôm nay</div></div></div></td><td><span class="badge b-orange">range()</span></td><td><span class="badge b-blue">Luyện tập</span></td></tr><tr><td><div class="student"><span class="avatar">L</span><div><div class="student-name">Linh Phạm</div><div class="student-meta">Lớp 7 · hôm nay</div></div></div></td><td><span class="badge b-green">Đã nắm</span></td><td><span class="badge b-green">Nâng cao</span></td></tr></tbody></table></div><div class="card"><div class="section-head"><h2>Recommendation gần đây</h2><span class="badge b-blue">Live log</span></div><div class="mini-list"><div class="recommend"><div class="rec-icon">↗</div><div><div class="rec-title">An → Ôn lại khái niệm lặp</div><div class="rec-reason">Điểm quiz 40% · sai 3/5 câu về for-loop</div></div></div><div class="recommend"><div class="rec-icon">↗</div><div><div class="rec-title">Linh → Bài tập lồng vòng lặp</div><div class="rec-reason">Điểm quiz 95% · hoàn thành nhanh hơn 30%</div></div></div><div class="recommend"><div class="rec-icon">↗</div><div><div class="rec-title">Minh → Luyện tập range()</div><div class="rec-reason">Sai chủ đề range · cần thêm 1 bài củng cố</div></div></div></div></div></div><div class="section card"><div class="section-head"><div><h2>Tiến độ khóa học Python cơ bản</h2><p class="muted">Chủ đề pilot: vòng lặp trong lập trình</p></div><span class="badge b-green">1 lớp · 20 học viên</span></div><div class="grid g3"><div><div class="metric-label">Hoàn thành khóa học</div><div class="metric">62%</div><div class="bar"><i style="width:62%"></i></div></div><div><div class="metric-label">Quiz trung bình</div><div class="metric">74%</div><div class="bar green"><i style="width:74%"></i></div></div><div><div class="metric-label">Học viên có đề xuất mới</div><div class="metric">11</div><div class="bar orange"><i style="width:55%"></i></div></div></div></div>`,
        "Admin / Content team"
      );
    }
    function variantB() {
      return shell(
