# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
previews:
  generation: off

databases:
  - name: mindbridge-demo-db
    plan: free

services:
  - type: web
    runtime: node
    name: mindbridge-demo-api
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter server baml:generate
    startCommand: pnpm db:migrate && BETTER_AUTH_URL=https://$API_HOST CORS_ORIGIN=https://$WEB_HOST pnpm --filter server exec node --import tsx src/index.ts
    healthCheckPath: /
    envVars:
      - key: API_HOST
        fromService:
          type: web
          name: mindbridge-demo-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: WEB_HOST
        fromService:
          type: web
          name: mindbridge-demo-web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: DATABASE_URL
        fromDatabase:
          name: mindbridge-demo-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

  - type: web
    runtime: node
    name: mindbridge-demo-web
    plan: free
    buildCommand: pnpm install --frozen-lockfile && VITE_SERVER_URL=https://$API_HOST pnpm --filter web build
    startCommand: pnpm --filter web serve --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: API_HOST
        fromService:
          type: web
          name: mindbridge-demo-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: NODE_ENV
        value: production
